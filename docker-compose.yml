version: "3.9"

services:

  qresolve-api:

    build: .

    container_name: qresolve-api

    ports:
      - "8000:8000"

    volumes:
      - qresolve-db:/app/database

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3

    restart: unless-stopped


volumes:

  qresolve-db: